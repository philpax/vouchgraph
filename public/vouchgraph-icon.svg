<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 630 630" width="630" height="630">
  <rect width="630" height="630" fill="#0f1729"/>

  <!-- Edges (60% opacity) -->
  <line x1="124" y1="123" x2="315" y2="507" stroke="#c4b5fd" stroke-opacity="0.6" stroke-width="4.5"/>
  <line x1="506" y1="123" x2="315" y2="507" stroke="#c4b5fd" stroke-opacity="0.6" stroke-width="4.5"/>

  <!-- Arrow: top-left → bottom-center -->
  <g transform="translate(219.5, 315) rotate(63.4)">
    <polygon points="-11,-8.5 11,0 -11,8.5" fill="#c4b5fd" fill-opacity="0.6"/>
  </g>
  <!-- Arrow: bottom-center → top-right (flipped) -->
  <g transform="translate(410.5, 315) rotate(-63.4)">
    <polygon points="-11,-8.5 11,0 -11,8.5" fill="#c4b5fd" fill-opacity="0.6"/>
  </g>

  <!-- Nodes (full opacity) -->
  <circle cx="124" cy="123" r="26" fill="#c4b5fd"/>
  <circle cx="506" cy="123" r="26" fill="#c4b5fd"/>
  <circle cx="315" cy="507" r="26" fill="#c4b5fd"/>
</svg>
